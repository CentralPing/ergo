name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
permissions: {}
jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        node-version: [22, 24]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci --ignore-scripts
      - run: npm test
      - run: npm run check-types
      - if: matrix.node-version == 22
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v5
        with:
          files: ./coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
      - if: github.ref == 'refs/heads/main' && matrix.node-version == 22
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4
        continue-on-error: true
        with:
          token: ${{ secrets.WEBSITE_DISPATCH_TOKEN }}
          repository: CentralPing/centralping.github.io
          event-type: docs-update
          # deploy.yml expects short name: "ergo" or "ergo-router", not npm scope
          client-payload: '{"package": "ergo", "version": "dev"}'

  test-deno:
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2
        with:
          deno-version: v2.x
      - run: npm ci --ignore-scripts
      - name: Run tests with Deno
        run: >-
          deno test --allow-all
          $(find . \( -name '*.spec.unit.js' -o -name '*.spec.func.js' \) ! -path '*/node_modules/*' | sort)

  test-bun:
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: latest
      - run: npm ci --ignore-scripts
      - name: Run tests with Bun
        run: >-
          bun test
          $(find . \( -name '*.spec.unit.js' -o -name '*.spec.func.js' \) ! -path '*/node_modules/*' | sort)
