language: en-US
early_access: true

tone_instructions: >
  Focus on RFC compliance, security hardening (prototype pollution, injection,
  timing attacks), performance (avoid async overhead), and the Fast Fail pipeline
  contract. Verify null-prototype policy and {value, response} return convention.

reviews:
  profile: assertive
  request_changes_workflow: true
  high_level_summary: true
  high_level_summary_in_walkthrough: true
  collapse_walkthrough: false
  changed_files_summary: true
  sequence_diagrams: true
  review_details: true
  poem: false
  in_progress_fortune: false
  review_status: true
  related_issues: true
  related_prs: true
  assess_linked_issues: true
  estimate_code_review_effort: true
  enable_prompt_for_ai_agents: true
  abort_on_close: true

  path_filters:
    - "!assets/**"
    - "!benchmarks/**"

  path_instructions:
    - path: "lib/**"
      instructions: >
        Shared primitives — pure functions with no transport or framework dependencies.
        Must use null-prototype objects (Object.create(null)) for user-input-derived data.
        Use undefined (not null) for absent values. No HTTP or framework imports.

    - path: "http/**"
      instructions: >
        Pipeline middleware factories. Must return {value?, response?} format.
        Mutating response accumulators breaks pipeline flow — for expected outcomes,
        return a response object instead of throwing httpErrors(). Verify JSDoc
        conventions: lowercase primitives, @returns not @return, import('node:...')
        for built-in Node.js types.

    - path: "utils/**"
      instructions: >
        Low-level utilities. get.js defaults invoke to false — callers must opt in
        explicitly. No mutation of req objects. Prefer ?? over || for nullish defaults.

    - path: "types-override/**"
      instructions: >
        Hand-written TypeScript declaration overrides that replace tsc-generated weak
        declarations. Must match the runtime behavior of the corresponding source files.
        Options interfaces use {ModuleName}Options naming. Result interfaces live in
        ergo.d.ts. Verify overloaded signatures align with source function signatures.

  auto_review:
    enabled: true
    auto_incremental_review: false
    drafts: false
    ignore_title_keywords:
      - "WIP"
      - "DO NOT MERGE"
      - "[skip review]"

  finishing_touches:
    docstrings:
      enabled: false
    unit_tests:
      enabled: false
    simplify:
      enabled: false

  pre_merge_checks:
    docstrings:
      mode: "off"
    title:
      mode: "warning"
      requirements: |
        PR title must follow conventional commit format: `{type}: {description} (#{issue-number})`
        where type is one of: feat, fix, refactor, docs, chore, test, spike.
        Description should be lowercase, imperative mood, concise.
    description:
      mode: "off"
    issue_assessment:
      mode: "warning"
    custom_checks:
      - name: "Null-Prototype Policy"
        mode: "warning"
        instructions: |
          Pass/fail criteria for changed JavaScript files in lib/ and http/:
          - FAIL if new code creates objects with `{}` or `new Object()` that store
            user-input-derived data (query parameters, cookie values, header values,
            parsed body fields). These MUST use `Object.create(null)` to prevent
            prototype pollution.
          - PASS if all user-input-derived object creation uses Object.create(null),
            or if no relevant files changed.
          Note: `{}` is acceptable for internal/configuration objects not derived from
          user input (e.g., factory option defaults, response accumulator seeds).

      - name: "Pipeline Contract"
        mode: "warning"
        instructions: |
          Pass/fail criteria for changed files in http/:
          - FAIL if a middleware factory returns values not conforming to the
            {value?, response?} convention. Middleware must not throw httpErrors() for
            expected outcomes — return {response: {statusCode, detail?}} instead.
          - FAIL if middleware mutates req or res directly instead of returning
            {response: {headers: [...]}} tuples via the response accumulator.
          - PASS if all middleware follow the two-accumulator return convention, or if
            no http/ files changed.

      - name: "JSDoc Completeness"
        mode: "warning"
        instructions: |
          Pass/fail criteria for changed JavaScript source files (excluding tests and benchmarks):
          - FAIL if a new exported function lacks @param and @returns JSDoc annotations.
          - FAIL if JSDoc uses uppercase primitives (String, Number, Boolean instead of
            string, number, boolean), including inside compound types.
          - FAIL if JSDoc uses @return instead of @returns.
          - FAIL if JSDoc references Node.js built-in types without the import('node:...')
            form (e.g., {Readable} instead of {import('node:stream').Readable}).
          - PASS if all JSDoc follows conventions, or if no source files changed.
          Exclude test files from this check.

      - name: "Zero Tech Debt"
        mode: "error"
        instructions: |
          Pass/fail criteria for all changed files (exclude .coderabbit.yaml itself):
          - FAIL if new source code lines (added in this PR, not pre-existing) contain
            TODO, FIXME, HACK, or XXX comments. Exclude .coderabbit.yaml and other
            CI/CD configuration files whose instructions reference these markers by name.
          - PASS if no such markers are found in newly added lines.
          This is a pre-release project with a zero-tech-debt policy — all work is either
          done now or tracked as a GitHub issue.

  tools:
    ast-grep:
      essential_rules: true
    github-checks:
      enabled: true
      timeout_ms: 300000
    shellcheck:
      enabled: true
    markdownlint:
      enabled: true
    languagetool:
      enabled: true
      level: "default"
    gitleaks:
      enabled: true
    trufflehog:
      enabled: true
    yamllint:
      enabled: true
    actionlint:
      enabled: true
    zizmor:
      enabled: true
    biome:
      enabled: false
    eslint:
      enabled: false
    oxc:
      enabled: false
    ruff:
      enabled: false
    pylint:
      enabled: false
    flake8:
      enabled: false
    golangci-lint:
      enabled: false
    clippy:
      enabled: false
    phpstan:
      enabled: false
    phpmd:
      enabled: false
    phpcs:
      enabled: false
    swiftlint:
      enabled: false
    rubocop:
      enabled: false
    detekt:
      enabled: false
    buf:
      enabled: false
    regal:
      enabled: false
    pmd:
      enabled: false
    clang:
      enabled: false
    cppcheck:
      enabled: false
    fortitudeLint:
      enabled: false
    fbinfer:
      enabled: false
    sqlfluff:
      enabled: false
    hadolint:
      enabled: false
    circleci:
      enabled: false
    prismaLint:
      enabled: false
    luacheck:
      enabled: false
    brakeman:
      enabled: false
    dotenvLint:
      enabled: false
    htmlhint:
      enabled: false
    stylelint:
      enabled: false
    checkmake:
      enabled: false
    osvScanner:
      enabled: true
    blinter:
      enabled: false
    smartyLint:
      enabled: false
    emberTemplateLint:
      enabled: false
    psscriptanalyzer:
      enabled: false

chat:
  auto_reply: true

knowledge_base:
  learnings:
    scope: auto
  issues:
    scope: auto
  pull_requests:
    scope: auto
  web_search:
    enabled: true
  code_guidelines:
    enabled: true
  linked_repositories:
    - repository: "CentralPing/ergo-router"
      instructions: >
        REST-compliant router that consumes ergo's shared primitives from lib/.
        Changes to lib/cors.js, lib/rate-limit.js, lib/security-headers.js,
        lib/attach-instance.js, lib/vary.js, or lib/sanitize-quoted-string.js
        may affect ergo-router's transport adapters.

issue_enrichment:
  auto_enrich:
    enabled: true
  planning:
    enabled: true
    auto_planning:
      enabled: true
